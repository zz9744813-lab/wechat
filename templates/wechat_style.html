<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ title }}</title>
<style>
  /* 邮件客户端兼容样式 */
  body {
    margin: 0; padding: 0;
    background: #f5f5f5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }
  .container {
    max-width: 600px;
    margin: 0 auto;
    background: #ffffff;
  }
  /* 头图区域 */
  .header {
    background: linear-gradient(135deg, {{ header_color_1 | default('#1a1a2e') }}, {{ header_color_2 | default('#16213e') }});
    padding: 40px 30px 30px;
    text-align: center;
  }
  .header h1 {
    color: #ffffff;
    font-size: 24px;
    line-height: 1.5;
    margin: 0 0 10px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .header .subtitle {
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin: 0;
  }
  .header .date {
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    margin-top: 15px;
  }
  /* 导语 */
  .lead {
    padding: 25px 30px;
    background: #fafafa;
    border-left: 4px solid {{ accent_color | default('#e94560') }};
    margin: 0;
    font-size: 15px;
    color: #666;
    line-height: 1.8;
  }
  /* 正文区域 */
  .content {
    padding: 20px 30px;
  }
  .content p {
    font-size: 16px;
    line-height: 2;
    color: #333;
    margin: 0 0 18px;
    text-align: justify;
  }
  .content h2 {
    font-size: 20px;
    color: {{ accent_color | default('#e94560') }};
    border-bottom: 2px solid {{ accent_color | default('#e94560') }};
    padding-bottom: 8px;
    margin: 35px 0 18px;
  }
  .content h3 {
    font-size: 17px;
    color: #1a1a2e;
    margin: 25px 0 12px;
  }
  .content blockquote {
    background: #f8f8f8;
    border-left: 3px solid {{ accent_color | default('#e94560') }};
    padding: 12px 18px;
    margin: 15px 0;
    font-size: 15px;
    color: #555;
  }
  .content ul, .content ol {
    padding-left: 20px;
    margin: 10px 0 18px;
  }
  .content li {
    font-size: 15px;
    line-height: 1.8;
    color: #444;
    margin-bottom: 8px;
  }
  .content strong {
    color: {{ accent_color | default('#e94560') }};
  }
  /* 数据卡片 */
  .data-card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px;
    padding: 20px 25px;
    margin: 20px 0;
    color: #fff;
  }
  .data-card .label {
    font-size: 13px;
    opacity: 0.8;
  }
  .data-card .value {
    font-size: 28px;
    font-weight: 700;
    margin: 5px 0;
  }
  .data-card .desc {
    font-size: 13px;
    opacity: 0.7;
  }
  /* 分隔线 */
  .divider {
    height: 1px;
    background: #eee;
    margin: 25px 30px;
  }
  /* 尾部 */
  .footer {
    padding: 25px 30px;
    background: #fafafa;
    text-align: center;
    border-top: 1px solid #eee;
  }
  .footer .tag {
    display: inline-block;
    background: {{ accent_color | default('#e94560') }};
    color: #fff;
    padding: 3px 12px;
    border-radius: 15px;
    font-size: 12px;
    margin: 2px 4px;
  }
  .footer .copyright {
    font-size: 12px;
    color: #999;
    margin-top: 15px;
    line-height: 1.6;
  }
  /* 引导关注 */
  .cta {
    background: {{ accent_color | default('#e94560') }};
    color: #fff;
    padding: 15px 30px;
    text-align: center;
    font-size: 14px;
  }
  .cta strong {
    color: #fff;
    font-size: 16px;
  }
</style>
</head>
<body>
<div class="container">
  <!-- 头部 -->
  <div class="header">
    <h1>{{ title }}</h1>
    <p class="subtitle">{{ subtitle }}</p>
    <p class="date">📅 {{ date }}</p>
  </div>

  <!-- 导语 -->
  <p class="lead">{{ lead }}</p>

  <!-- 正文 -->
  <div class="content">
    {{ content_html }}
  </div>

  <!-- 分隔线 -->
  <div class="divider"></div>

  <!-- 尾部标签 -->
  <div class="footer">
    <div>
      {% for tag in tags %}
      <span class="tag"># {{ tag }}</span>
      {% endfor %}
    </div>
    <p class="copyright">
      本文由 AI 自动生成 · 数据来源于公开网络<br>
      仅供参考，不构成任何投资或决策建议<br>
      生成时间：{{ generated_at }}
    </p>
  </div>
</div>
</body>
</html>
